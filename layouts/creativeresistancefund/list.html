{{ define "main" }}

<div class="crf-pagetitle">{{ .Title }}</div>

<div class="crf-post-list">
  {{ range sort .RegularPages "Date" "desc" }}
    {{ if not .Params.private }}
    <div class="crf-post-entry">
      <div class="crf-date">{{ .Date.Format "January 2, 2006" }}</div>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <div class="crf-excerpt">{{ .Summary }}</div>
      <div style="clear: both;"></div>
    </div>
    {{ end }}
  {{ end }}
</div>

{{ end }}
