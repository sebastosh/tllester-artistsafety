<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.Title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .home-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .home-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 1100px;
      width: 100%;
    }
    .home-card {
      background: #fff;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      color: #333;
      padding: 40px 20px 30px;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .home-card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      transform: translateY(-3px);
    }
    .home-card img {
      max-width: 100%;
      height: 160px;
      object-fit: contain;
      margin-bottom: 20px;
    }
    .home-card-title {
      font-size: 1.2em;
      font-weight: 600;
    }
    @media (max-width: 768px) {
      .home-grid {
        grid-template-columns: 1fr;
        max-width: 400px;
      }
    }
  </style>
</head>
<body>
  <div class="home-wrap">
    <div class="home-grid">
      <a href="{{ "/freedimensional/" | relURL }}" class="home-card">
        <img src="{{ "/freedimensional/images/fd-logo-banner.gif" | relURL }}" alt="freeDimensional">
        <div class="home-card-title">FreeDimensional</div>
      </a>
      <a href="{{ "/creativeresistancefund/" | relURL }}" class="home-card">
        <img src="{{ "/freedimensional/images/fd-header-logo.jpg" | relURL }}" alt="Creative Resistance Fund">
        <div class="home-card-title">Creative Resistance Fund</div>
      </a>
      <a href="{{ "/artistsafety/" | relURL }}" class="home-card">
        <img src="{{ "/artistsafety/images/asn-logo-wordmark.png" | relURL }}" alt="ArtistSafety.net">
        <div class="home-card-title">ArtistSafety.net</div>
      </a>
    </div>
  </div>
</body>
</html>
