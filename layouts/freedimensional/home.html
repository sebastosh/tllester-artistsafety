{{ define "main" }}

<div class="fd-section-header">{{ .Title }}</div>

<div class="fd-post-list">
  {{ range sort .RegularPages "Date" "desc" }}
    {{ if and (not .Params.private) (ne .Title "Search") }}
    <div class="fd-post-entry">
      <div class="fd-date">{{ .Date.Format "January 2, 2006" }}</div>
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <div class="fd-excerpt">{{ .Summary }}</div>
      <div style="clear: both;"></div>
    </div>
    {{ end }}
  {{ end }}
</div>

{{ end }}
